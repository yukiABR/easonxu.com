<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>easonxu.com</title>
  <style>
    :root {
      color-scheme: only light;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      color: #fff;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }
    body {
      position: relative;
      overflow: hidden;
      background: linear-gradient(rgba(0, 0, 0, 0.32), rgba(0, 0, 0, 0.32)), url("./SEAS.jpg") center/cover no-repeat fixed;
    }
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        linear-gradient(30deg, transparent 17.22%, rgba(255, 255, 255, 0.34) 17.30%, rgba(255, 255, 255, 0.34) 17.36%, transparent 17.44%),
        linear-gradient(30deg, transparent 69.14%, rgba(255, 255, 255, 0.32) 69.22%, rgba(255, 255, 255, 0.32) 69.28%, transparent 69.36%),
        linear-gradient(30deg, transparent 87.10%, rgba(255, 255, 255, 0.28) 87.18%, rgba(255, 255, 255, 0.28) 87.24%, transparent 87.32%);
    }
    .wrap {
      position: relative;
      z-index: 1;
      width: min(92vw, 980px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 20px 20px calc(36px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
    }
    .links {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
    }
    a {
      display: inline-block;
      color: #fff;
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.85);
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 14px;
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(2px);
    }
    a:hover {
      background: rgba(0, 0, 0, 0.38);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="links">
      <a href="./chem-valence-drill.html">进入化合价训练</a>
      <a href="./chem-valence-game.html">进入化合价闯关</a>
      <a href="./english-vocab-arcade.html">进入英语词汇射击场</a>
      <a href="./english-vocab-match3.html">进入英语词汇消除场</a>
    </div>
  </div>
</body>
</html>
